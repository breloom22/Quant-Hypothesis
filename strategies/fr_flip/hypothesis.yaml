strategy_name: fr_flip
created_at: '2026-03-28T22:22:34'
status: complete
phase_0:
  observation: FR(펀딩비)의 부호가 전환될 때 가격 반전이 발생하는 경향이 있다. 음수 FR은 숏 과밀(숏 스퀴즈 가능성), 양수 FR은
    롱 과밀(롱 청산 가능성)을 암시한다.
  expectation: FR이 +에서 -로 전환되면 숏 과밀로 인한 캐스케이드 반등 예상 → 롱 진입. FR이 -에서 +로 전환되면 롱 과밀로
    인한 캐스케이드 하락 예상 → 숏 진입.
  frequency_sense: 펀딩비는 8시간마다 정산. 부호 전환은 수일~수주 간격으로 발생. 월 2~5회 정도 시그널 예상.
  target_market:
    exchange: binanceusdm
    symbols:
    - BTC/USDT:USDT
    timeframe: 8h
    data_source: ccxt
phase_1:
  variables:
  - name: funding_rate_sign_change
    role: 진입 트리거. FR 부호 전환 시점 포착.
    initial_implementation: sign(fr_t) != sign(fr_t-1), threshold=0
    initial_reason: 가장 단순한 이진 분류. 핵심 메커니즘만 격리 테스트.
    candidates:
    - name: magnitude_threshold
      reason: '|FR|>0.01% 조건 추가, 0근처 노이즈 제거'
      expected_if_success: FR 크기가 과밀 강도 반영
      expected_if_failure: 크기 무관, 부호 자체가 신호
    - name: consecutive_candles_confirmation
      reason: n개 연속 동일 부호 후 전환 확정
      expected_if_success: 지속성이 핵심, 단발 전환은 노이즈
      expected_if_failure: 조기 진입이 유리, 확인 후 이미 늦음
    - name: rolling_zscore_normalization
      reason: Z-score 정규화로 상대적 극단 포착
      expected_if_success: 상대적 편향이 과밀을 더 잘 설명
      expected_if_failure: 절대 수준 자체가 정보, 정규화가 역효과
  - name: entry_timing
    role: 부호 전환 확인 후 실제 진입 시점.
    initial_implementation: FR 부호 전환 확인된 8h봉 종가에 시장가 진입
    initial_reason: 가장 단순. 슬리피지/정산 타이밍 이슈 측정용 베이스라인.
    candidates:
    - name: next_open_entry
      reason: 다음봉 시가 진입 (실현 가능성)
      expected_if_success: 1봉 지연이 유의미한 차이 없음
      expected_if_failure: 신호 즉시 소멸, 종가 진입 불가가 구조적 결함
    - name: pullback_entry
      reason: 전환 후 되돌림 시 진입
      expected_if_success: 초기 과반응 후 재진입 기회 존재
      expected_if_failure: 되돌림 없이 직행, 기회비용 초과
  - name: exit_condition
    role: 포지션 청산 기준. 수익 실현 및 손실 제한.
    initial_implementation: 고정 보유 3봉(24h) + SL -2%
    initial_reason: 청산 복잡성 최소화. 진입 신호의 순수 예측력만 측정.
    candidates:
    - name: fr_sign_reversal_exit
      reason: FR 부호 재반전 시 청산
      expected_if_success: FR 지속성이 수익 지속성과 연동
      expected_if_failure: 진입/청산 신호는 별개 메커니즘
    - name: price_target_exit
      reason: +X% 도달 시 익절
      expected_if_success: FR 전환 효과가 제한적 범위
      expected_if_failure: 스퀴즈 후 추세 형성, 조기 익절 기회비용
    - name: trailing_stop_exit
      reason: 고점/저점 대비 -X% 이격 시 청산
      expected_if_success: 동적 청산이 유효
      expected_if_failure: whipsaw로 조기 청산
  - name: position_sizing
    role: 각 트레이드의 자본 배분 크기.
    initial_implementation: 고정 비율 10%, 레버리지 1x
    initial_reason: 사이징 영향 제거. 신호 품질 자체만 측정.
    candidates:
    - name: fr_magnitude_scaling
      reason: '|FR| 크기 비례 포지션'
      expected_if_success: FR 크기와 반전 크기 상관관계 존재
      expected_if_failure: 과밀 여부는 이진적, 크기는 노이즈
  mechanism:
    statement: FR 부호 전환은 지배적 포지션의 항복 완료를 의미하며, 전환 방향의 반대로 8h 지연 후 32h 내외의 추세가 확립된다.
      (반전 신호)
    prerequisites:
    - 'P1: 펀딩비 부호는 롱/숏 포지션의 상대적 과밀을 나타낸다'
    - 'P2: 과밀 방향 포지션 보유자들이 펀딩비 부담으로 포지션 정리/억제'
    - 'P3: 부호 전환은 상당한 포지션 쏠림 이후 발생, 강제 청산 연결 가능'
    - 'P4: BTC/USDT 영구선물 유동성 충분, 단일 전략 영향 없음'
    causal_chain:
    - 'A: FR 부호 전환 발생 (예: +→-, 기존 롱 과밀이 해소됨)'
    - 'B: 전환 직후 8h 마찰 구간 (청산 잔여물, 노이즈)'
    - 'C: 8h 후 새로운 방향의 추세 시작 (반대 포지션 우위 확립)'
    - 'D: 32h 내외 추세 지속 후 소멸'
    falsification:
    - 'F1: FR 전환 후 가격이 반대 방향 지속 (예측 방향 자체가 틀림)'
    - 'F2: FR 전환 후 가격 변동이 랜덤워크와 구분 불가 (예측력 없음)'
    - 'F3: |FR| 큰 전환이 작은 전환보다 수익 낮음 (과밀 강도 ≠ 스퀴즈 강도)'
    - 'F4: 유동성 낮은 알트가 BTC보다 훨씬 강한 효과 (BTC 스퀴즈 빠르게 소멸)'
    version: 2
  predictions:
  - id: P01
    statement: FR 부호 전환 진입이 랜덤 진입 대비 통계적으로 유의미하게 높은 수익
    test_type: ab_compare
    success_condition: 평균 수익 A>B, p<0.05, Sharpe>0
    failure_learning: 신호 없음. FR 전환은 가격 반전 선행 지표 아님. 메커니즘 근본 오류 또는 이미 선반영.
    priority: high
    status: pending
    result: {}
  - id: P02
    statement: 가격 반전 효과가 전환 직후 1~2봉에 집중되고 시간에 따라 감쇄
    test_type: property_check
    success_condition: '평균 수익: 1봉>2봉>3봉>=0 (단조 감쇄)'
    failure_learning: 효과 지연 시 추세추종 메커니즘, 증가 시 추세전환 초기 신호. 청산 전략 재설계.
    priority: high
    status: pending
    result: {}
  - id: P03
    statement: '|FR| 큰 전환이 작은 전환보다 더 큰 가격 반전 생성'
    test_type: ab_compare
    success_condition: high_fr 수익 > low_fr 수익, Spearman rho>0.2, p<0.1
    failure_learning: FR 크기는 스퀴즈 강도 무관. magnitude_threshold, fr_magnitude_scaling
      폐기.
    priority: medium
    status: pending
    result: {}
  - id: P04
    statement: 롱(+→-) 방향과 숏(-→+) 방향이 대칭적 성과
    test_type: ab_compare
    success_condition: 두 방향 모두 양수 수익, 수익률 차이 <30%
    failure_learning: BTC 상승 bias로 숏 무력화 시 단방향(롱only) 전략으로 전환.
    priority: medium
    status: pending
    result: {}
  - id: P05
    statement: 횡보장에서 추세장보다 더 강한 반전 효과
    test_type: domain_test
    success_condition: 횡보장 평균 수익 > 추세장, 횡보장 승률 >60%
    failure_learning: 국면 무관하면 필터링 불필요. 추세장에서 더 강하면 보유기간 확장.
    priority: low
    status: pending
    result: {}
